name: Cleanup Short Workflow Runs

on:
  workflow_dispatch:
  schedule:
    - cron: '30 */3 * * *'  # Run every 3 hours at 30 minutes past the hour

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Fetch recent workflow runs
        run: |
          echo 'Fetching workflow runs...'
          # 捕获curl请求的HTTP状态码，校验API请求是否成功
          response_code=$(curl -s -o runs.json -w "%{http_code}" -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=50)
          echo "API Response Code: $response_code"
          if [ "$response_code" -ne 200 ]; then
              echo $'\u274c Failed to fetch workflow runs, HTTP status: '"$response_code"
              cat runs.json  # 打印错误信息便于排查
              exit 1
          fi
          echo "Saved workflow runs to runs.json"

      - name: Delete short and completed workflow runs (<10 minutes)
        run: |
          echo 'Deleting completed workflow runs with duration < 10 minutes...'
          
          # 前置校验：检查.workflow_runs是否存在且非null，避免jq遍历报错
          if ! jq -e '.workflow_runs' runs.json > /dev/null 2>&1; then
              echo $'\u26A0\ufe0f No workflow runs found (field is null/missing), cleanup skipped'
              exit 0
          fi
          
          # 提取数据：添加[]?兼容null场景，只处理已完成的运行记录
          jq -r '.workflow_runs[]? | select(.status=="completed") | "\(.id) \(.run_started_at) \(.updated_at)"' runs.json > runs_times.txt
          
          threshold=600  # 10 minutes in seconds
          
          while read run_id start_time end_time; do
              # 跳过空行
              if [ -z "$run_id" ]; then
                  continue
              fi
              
              # 转换为时间戳，并重定向错误输出避免干扰
              start_ts=$(date -d "$start_time" +%s 2>/dev/null)
              end_ts=$(date -d "$end_time" +%s 2>/dev/null)
              
              # 处理时间转换失败的情况
              if [ -z "$start_ts" ] || [ -z "$end_ts" ]; then
                  echo $'\u274c Workflow run '"$run_id"' time conversion failed, skip'
                  continue
              fi
              
              duration=$((end_ts - start_ts))
              
              if [ $duration -lt $threshold ]; then
                  echo $'\u26A0\ufe0f Workflow run '"$run_id"' duration '"$duration"' seconds < '"$threshold"', deleting...'
                  # 发送删除请求并捕获HTTP状态码
                  response=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE -H "Authorization: token $GH_TOKEN" \
                    "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id")
                  if [ "$response" = "204" ]; then
                      echo $'\u2705 Deleted workflow run '"$run_id"' successfully'
                  else
                      echo $'\u274c Failed to delete workflow run '"$run_id"', HTTP status: '"$response"
                  fi
              else
                  echo $'\u2705 Workflow run '"$run_id"' duration '"$duration"' seconds, keep'
              fi
          done < runs_times.txt
